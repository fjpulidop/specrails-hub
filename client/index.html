<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>specrails — Hub</title>
    <!--
      Anti-FOUC: read the cached theme synchronously and apply it to <html>
      BEFORE Vite's module bundle loads. Without this, every boot would flash
      the default Dracula palette for one frame before the chosen theme
      paints. Allow-list matches THEME_IDS in client/src/lib/themes.ts.
    -->
    <script>
      (function () {
        try {
          var k = 'specrails-hub:ui-theme'
          var allowed = ['dracula', 'aurora-light', 'obsidian-dark']
          var v = localStorage.getItem(k)
          document.documentElement.dataset.theme =
            v && allowed.indexOf(v) !== -1 ? v : 'dracula'
        } catch (_) {
          document.documentElement.dataset.theme = 'dracula'
        }
      })()
    </script>
    <!--
      Inline splash: renders instantly while the JS bundle parses + initAuth()
      polls the sidecar. Faded out as soon as React mounts (see main.tsx).
    -->
    <style>
      /* Theme-aware splash. Three CSS variables set at <html> level by the
         anti-FOUC boot script via [data-theme="..."]; the splash reads them
         so the loading screen always matches the user's chosen theme. */
      html[data-theme="dracula"] {
        --splash-bg: #282a36;
        --splash-fg: #f8f8f2;
        --splash-primary: #bd93f9;
        --splash-secondary: #ff79c6;
        --splash-muted: #6272a4;
      }
      html[data-theme="aurora-light"] {
        --splash-bg: #fafbfd;
        --splash-fg: #1a1d2b;
        --splash-primary: #5733e0;
        --splash-secondary: #d62a85;
        --splash-muted: #5b6178;
      }
      html[data-theme="obsidian-dark"] {
        --splash-bg: #10121a;
        --splash-fg: #e3e6f0;
        --splash-primary: #b78cf5;
        --splash-secondary: #f48fc7;
        --splash-muted: #8b8fa3;
      }
      html, body {
        margin: 0;
        background: var(--splash-bg);
        color: var(--splash-fg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      }
      #specrails-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        background:
          radial-gradient(1200px 600px at 50% 40%, color-mix(in srgb, var(--splash-primary) 10%, transparent), transparent 60%),
          radial-gradient(900px 500px at 80% 80%, color-mix(in srgb, var(--splash-secondary) 8%, transparent), transparent 60%),
          var(--splash-bg);
        z-index: 9999;
        opacity: 1;
        transition: opacity 220ms ease-out, visibility 0s linear 220ms;
        -webkit-font-smoothing: antialiased;
        -webkit-app-region: drag;
      }
      #specrails-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }
      .specrails-splash__brand {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
        display: flex;
        gap: 0;
      }
      .specrails-splash__brand .part-a { color: var(--splash-primary); }
      .specrails-splash__brand .part-b { color: var(--splash-secondary); }
      .specrails-splash__brand .part-c {
        color: var(--splash-muted);
        font-weight: 400;
        margin-left: 8px;
      }
      .specrails-splash__spinner {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid color-mix(in srgb, var(--splash-fg) 12%, transparent);
        border-top-color: var(--splash-primary);
        animation: specrails-spin 720ms linear infinite;
      }
      .specrails-splash__hint {
        font-size: 11px;
        color: var(--splash-muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      @keyframes specrails-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .specrails-splash__spinner { animation-duration: 1600ms; }
      }
    </style>
  </head>
  <body>
    <div id="specrails-splash" aria-hidden="false" role="status" aria-label="Loading specrails hub">
      <div class="specrails-splash__brand">
        <span class="part-a">spec</span><span class="part-b">rails</span><span class="part-c">hub</span>
      </div>
      <div class="specrails-splash__spinner" aria-hidden="true"></div>
      <div class="specrails-splash__hint">starting</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
