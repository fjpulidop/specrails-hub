name: Desktop Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # allows manual trigger from GitHub UI or: gh workflow run desktop-release.yml

permissions:
  contents: write

env:
  # Exact pin (was floating latest-v22.x resolved at build time) so rebuilding a
  # tag is reproducible and the three platform jobs of one release always embed
  # the same Node. Each job still verifies the download against the SHASUMS256.txt
  # of this version. Bump deliberately via PR.
  NODE_BUNDLE_VERSION: "v22.22.3"
  GIT_BUNDLE_VERSION: "2.49.0"
  # Bundle a Chromium build for the embedded browser-capture feature ("Add Spec
  # from browser"). Default OFF: when unset/false the desktop app falls back to a
  # Playwright-managed Chromium downloaded on first use (server/chromium-resolver.ts
  # returns null → Playwright's default). Flip to "true" to ship Chromium inside the
  # app for an offline-first experience.
  #
  # Chromium is shipped as a single OPAQUE, OBFUSCATED blob (chromium.pak), NOT an
  # unpacked tree. Two reasons:
  #   1. Tauri's resource bundler dereferences symlinks when copying bundle.resources
  #      (tauri-apps/tauri#13219), mangling Chromium's versioned *.framework. A single
  #      file has nothing to dereference.
  #   2. The notarization service recursively unpacks archives it recognises
  #      (.zip → .tar.gz → .tar → …) and validates every Mach-O inside; Chromium's ~50
  #      nested binaries are only ad-hoc-signed by Google, so a plain archive fails
  #      notarization. chromium.pak is a XOR-transformed chromium.tar.gz — the broken
  #      gzip/tar magic means the notary treats it as opaque data and inspects nothing,
  #      so the app notarizes with NO Developer-ID signing of Chromium.
  # The server reverses the XOR and extracts it on first use; the extracted Chromium
  # keeps Google's ad-hoc signature (enough to run on arm64) and, being self-extracted,
  # is not Gatekeeper-quarantined. (Obfuscation, not security: the key is public.)
  BUNDLE_CHROMIUM: "true"

jobs:
  build-macos:
    runs-on: macos-latest  # Apple Silicon (arm64)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 20
          cache: npm
          # Two npm trees (root + client/) — key the cache on both lockfiles so
          # client-only dependency changes also refresh it.
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci && cd client && npm ci

      - name: Download and verify Node.js ${{ env.NODE_BUNDLE_VERSION }} (macOS arm64)
        run: |
          set -euo pipefail
          NODE_VERSION="${NODE_BUNDLE_VERSION}"
          TARBALL="node-${NODE_VERSION}-darwin-arm64.tar.gz"
          URL="https://nodejs.org/dist/${NODE_VERSION}/${TARBALL}"
          echo "Downloading Node.js ${NODE_VERSION} (macOS arm64)..."
          curl -fsSL "${URL}" -o "${TARBALL}"
          EXPECTED_SHA=$(curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/SHASUMS256.txt" \
            | grep "${TARBALL}" | awk '{print $1}')
          ACTUAL_SHA=$(shasum -a 256 "${TARBALL}" | awk '{print $1}')
          if [[ "${EXPECTED_SHA}" != "${ACTUAL_SHA}" ]]; then
            echo "CHECKSUM MISMATCH: expected=${EXPECTED_SHA} actual=${ACTUAL_SHA}"
            exit 1
          fi
          echo "Checksum OK: ${ACTUAL_SHA}"
          mkdir -p src-tauri/runtimes/node
          # Preserve symlinks on extraction (no -h / --dereference). We then REPLACE
          # the npm/npx symlinks with wrapper scripts below — Tauri's resource bundler
          # dereferences symlinks (tauri-apps/tauri#13219), which would otherwise turn
          # bin/npm into a broken copy that throws "Cannot find module '../lib/cli.js'".
          tar -xzf "${TARBALL}" --strip-components=1 -C src-tauri/runtimes/node
          rm "${TARBALL}"
          # Replace bin/npm and bin/npx (relative symlinks → ../lib/node_modules/npm/...)
          # with relocation-robust POSIX wrapper scripts that invoke the bundled node by
          # a path relative to their own location. Plain text → survives bundling; no
          # symlink/PATH dependency; always uses the bundled node.
          NB="src-tauri/runtimes/node/bin"
          # IMPORTANT: rm the symlinks FIRST. `> file` onto a symlink follows the link
          # and clobbers its TARGET (lib/node_modules/npm/bin/npm-cli.js), leaving the
          # symlink intact — which corrupts npm. Deleting first makes printf create a
          # fresh regular file.
          rm -f "${NB}/npm" "${NB}/npx"
          printf '%s\n' \
            '#!/bin/sh' \
            'DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd -P)"' \
            'exec "$DIR/node" "$DIR/../lib/node_modules/npm/bin/npm-cli.js" "$@"' \
            > "${NB}/npm"
          printf '%s\n' \
            '#!/bin/sh' \
            'DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd -P)"' \
            'exec "$DIR/node" "$DIR/../lib/node_modules/npm/bin/npx-cli.js" "$@"' \
            > "${NB}/npx"
          chmod 755 "${NB}/node" "${NB}/npm" "${NB}/npx"
          echo "Extracted Node.js ${NODE_VERSION}; npm/npx replaced with bundled-node wrappers."

      - name: Build relocatable Git ${{ env.GIT_BUNDLE_VERSION }} from source (macOS arm64)
        run: |
          set -euo pipefail
          GIT_VERSION="${{ env.GIT_BUNDLE_VERSION }}"
          GIT_SHA256="618190cf590b7e9f6c11f91f23b1d267cd98c3ab33b850416d8758f8b5a85628"  # git-2.49.0.tar.xz (kernel.org signed sha256sums)
          TARBALL="git-${GIT_VERSION}.tar.xz"
          curl -fsSL "https://mirrors.edge.kernel.org/pub/software/scm/git/${TARBALL}" -o "${TARBALL}"
          ACTUAL_SHA=$(shasum -a 256 "${TARBALL}" | awk '{print $1}')
          if [[ "${GIT_SHA256}" != "${ACTUAL_SHA}" ]]; then
            echo "CHECKSUM MISMATCH for ${TARBALL}: expected=${GIT_SHA256} actual=${ACTUAL_SHA}"
            exit 1
          fi
          echo "Checksum OK: ${ACTUAL_SHA}"
          tar xf "${TARBALL}"
          DEST="$PWD/src-tauri/runtimes/git"
          rm -rf "${DEST}"; mkdir -p "${DEST}"
          pushd "git-${GIT_VERSION}" >/dev/null
          # RUNTIME_PREFIX makes git locate libexec/git-core + templates RELATIVE to bin/git,
          # so the tree is relocatable. NO_GETTEXT + NO_OPENSSL + APPLE_COMMON_CRYPTO + omitting
          # USE_LIBPCRE2 => the only dylib deps are macOS system libs (/usr/lib, /System) =>
          # ZERO relocation/install_name_tool surgery needed. System /usr/bin/perl drives the
          # handful of perl helpers (git add -p, rebase -i).
          MAKE_FLAGS=(
            prefix=/
            RUNTIME_PREFIX=YesPlease
            NO_GETTEXT=1 NO_OPENSSL=1 APPLE_COMMON_CRYPTO=1
            NO_TCLTK=1 NO_GITWEB=1
            gitexecdir=libexec/git-core
            template_dir=share/git-core/templates
          )
          # git's Makefile links libcurl (https remote helpers) via curl-config. Only honor
          # a SELF-CONTAINED system curl-config (prefix /usr) — a Homebrew curl-config
          # (prefix /opt/homebrew) would make git link a non-system dylib and fail the
          # otool self-containment assertion below. When no system curl-config exists, drop
          # libcurl (+ expat): the hub only needs local git ops (init/add/commit), which
          # require neither. This keeps the build deterministic regardless of runner PATH.
          USE_CURL=0
          if command -v curl-config >/dev/null 2>&1 && [[ "$(curl-config --prefix 2>/dev/null)" == "/usr" ]]; then
            USE_CURL=1
          fi
          if [[ "${USE_CURL}" -eq 0 ]]; then
            echo "No self-contained system curl-config — building git without libcurl/expat (local ops only)."
            MAKE_FLAGS+=(NO_CURL=1 NO_EXPAT=1)
          fi
          make -j"$(sysctl -n hw.ncpu)" "${MAKE_FLAGS[@]}"
          make "${MAKE_FLAGS[@]}" DESTDIR="${DEST}" install
          popd >/dev/null
          rm -rf "git-${GIT_VERSION}" "${TARBALL}"
          # Collapse the libexec/git-core builtin hardlinks (each a full copy of git after a
          # link-unaware resource copy) — git dispatches builtins internally and does not need
          # them on disk. Keep the genuine helper binaries (git-http-*, git-remote-*, git-shell,
          # scalar, ...) and templates, which are NOT hardlinks to git.
          GITBIN="${DEST}/bin/git"
          if [[ -d "${DEST}/libexec/git-core" ]]; then
            find "${DEST}/libexec/git-core" -type f | while read -r f; do
              if [[ "${f}" -ef "${GITBIN}" ]]; then rm -f "${f}"; fi
            done
          fi
          # Assert the consumer contract (server/path-resolver.ts prepends git/bin) and self-containment.
          test -x "${DEST}/bin/git"
          test -d "${DEST}/libexec/git-core"
          test -d "${DEST}/share/git-core/templates"
          echo "=== otool -L git (must be system libs only) ==="
          otool -L "${DEST}/bin/git"
          if otool -L "${DEST}/bin/git" | awk 'NR>1{print $1}' | grep -E '(/opt/|/usr/local/|@rpath|@loader_path)'; then
            echo "ERROR: bundled git links a non-system dylib — not self-contained"; exit 1
          fi
          echo "Built relocatable Git ${GIT_VERSION} → ${DEST}"

      - name: Assemble bundled Chromium (macOS arm64)
        if: ${{ env.BUNDLE_CHROMIUM == 'true' }}
        run: |
          set -euo pipefail
          # Install the Chromium build pinned to our Playwright version, then pack its
          # platform folder into a single archive (runtimes/chromium/chromium.tar.gz).
          # We ship an ARCHIVE, not an unpacked tree, because Tauri's resource copy
          # dereferences Chromium's framework symlinks and breaks notarization (see the
          # env comment above). tar -czf preserves the symlinks; the server restores
          # them by extracting at first use (server/chromium-resolver.ts).
          npx playwright install chromium
          EXE=$(node -e "process.stdout.write(require('playwright').chromium.executablePath())")
          # Walk up to Playwright's platform folder (chrome-mac-arm64 / chrome-mac / …
          # depending on version) — the dir directly under chromium-<rev>.
          PLATDIR="$EXE"
          while [[ "$(basename "$(dirname "$PLATDIR")")" != chromium-* && "$PLATDIR" != "/" ]]; do PLATDIR=$(dirname "$PLATDIR"); done
          # Sanity: a *.app with a MacOS binary exists before we archive it.
          APP=$(find "$PLATDIR" -maxdepth 1 -name "*.app" -type d | head -1)
          test -n "${APP}" && test -n "$(find "${APP}/Contents/MacOS" -type f | head -1)"
          rm -rf src-tauri/runtimes/chromium
          mkdir -p src-tauri/runtimes/chromium
          # Archive the platform folder's CONTENTS (so it extracts back as chrome-mac-arm64/…),
          # then XOR-obfuscate it to chromium.pak so the notary cannot recurse into it
          # (it unpacks .tar.gz/.tar and would reject Chromium's ad-hoc-signed binaries).
          tar -czf /tmp/chromium.tar.gz -C "$(dirname "$PLATDIR")" "$(basename "$PLATDIR")"
          node scripts/obfuscate-chromium.mjs /tmp/chromium.tar.gz src-tauri/runtimes/chromium/chromium.pak
          rm -f /tmp/chromium.tar.gz
          ARCHIVE=src-tauri/runtimes/chromium/chromium.pak
          test -f "$ARCHIVE"
          echo "Packed Chromium from ${PLATDIR} → ${ARCHIVE} ($(du -h "$ARCHIVE" | cut -f1))"
          # Verify the blob round-trips back to a tarball with a discoverable executable.
          node scripts/obfuscate-chromium.mjs "$ARCHIVE" /tmp/chromium.verify.tar.gz
          VTMP=$(mktemp -d); tar -xf /tmp/chromium.verify.tar.gz -C "$VTMP"
          test -n "$(find "$VTMP" -maxdepth 2 -name "*.app" -type d | head -1)"
          rm -rf "$VTMP" /tmp/chromium.verify.tar.gz

      - name: Import codesign certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install Apple API key for notarization
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Sign bundled runtimes (macOS arm64)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            echo "APPLE_SIGNING_IDENTITY not set — skipping runtimes signing (unsigned local build)."
            exit 0
          fi
          ENT="src-tauri/entitlements.plist"
          # Tauri does NOT codesign bundle.resources binaries, so the bundled node/git
          # would fail notarization (or be killed by Gatekeeper) unsigned. Sign every
          # Mach-O under runtimes/ with hardened runtime + the JIT/library-validation
          # entitlements node's V8 needs. Signatures embed in the Mach-O and survive
          # Tauri's copy into the .app, so the assembled bundle notarizes cleanly.
          # Chromium is excluded here — it is a deep app bundle that must be signed
          # inside-out as bundles (see the dedicated step below), not as loose files.
          count=0
          while IFS= read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              codesign --force --timestamp --options runtime --entitlements "$ENT" \
                --sign "$APPLE_SIGNING_IDENTITY" "$f"
              count=$((count+1))
            fi
          done < <(find src-tauri/runtimes -type f -not -path '*/chromium/*')
          echo "Signed ${count} Mach-O binaries under src-tauri/runtimes/ (excluding chromium)"
          codesign --verify --strict --verbose=2 src-tauri/runtimes/node/bin/node
          codesign --verify --strict --verbose=2 src-tauri/runtimes/git/bin/git

      # Chromium is shipped as an opaque chromium.tar.gz archive (see "Assemble bundled
      # Chromium" above), so it needs NO codesigning — notarization treats archive bytes
      # as opaque data, and the extracted Chromium keeps Google's ad-hoc signature.

      - name: Build desktop app
        run: npm run build:desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Smoke test bundled runtimes — staging (macOS arm64)
        run: |
          set -euo pipefail
          # Fast pre-bundle check against src-tauri/runtimes/ (the in-bundle copy is
          # validated separately below). Scrub system Node/Git from PATH, then prepend
          # the bundled node dir so the npm/npx wrappers resolve the BUNDLED node — this
          # mirrors what server/path-resolver.ts does at runtime and proves the real chain.
          CLEAN_PATH=$(echo "$PATH" | tr ':' '\n' \
            | { grep -vE '(/usr/local/bin|/opt/homebrew|nvm|volta|nodenv|node|n/)' || true; } \
            | tr '\n' ':' | sed 's/:$//')
          export PATH="$(pwd)/src-tauri/runtimes/node/bin:${CLEAN_PATH}"
          bash scripts/smoke-bundled-runtimes.sh "$(pwd)/src-tauri/runtimes"

      - name: Smoke test bundled runtimes — inside .app (macOS arm64)
        run: |
          set -euo pipefail
          APP=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -n1)
          if [[ -z "${APP}" ]]; then echo "No .app bundle found"; exit 1; fi
          RT="${APP}/Contents/Resources/runtimes"
          echo "Validating the SHIPPED runtimes copy at: ${RT}"
          CLEAN_PATH=$(echo "$PATH" | tr ':' '\n' \
            | { grep -vE '(/usr/local/bin|/opt/homebrew|nvm|volta|nodenv|node|n/)' || true; } \
            | tr '\n' ':' | sed 's/:$//')
          export PATH="${RT}/node/bin:${CLEAN_PATH}"
          bash scripts/smoke-bundled-runtimes.sh "${RT}"
          # Confirm the shipped node is validly signed with hardened runtime.
          codesign --verify --strict "${RT}/node/bin/node" || { echo "node sig invalid"; exit 1; }
          codesign --verify --strict "${RT}/git/bin/git" || { echo "git sig invalid"; exit 1; }
          echo "In-bundle smoke test PASSED."

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dmg-aarch64
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  # ---------------------------------------------------------------
  # openspec: add-windows-desktop-release
  #
  # Windows x64 build. v1 is intentionally UNSIGNED — users will see
  # a SmartScreen warning and must click "More info → Run anyway".
  # Code signing (Authenticode via Azure Trusted Signing or similar)
  # is deferred to a follow-up change. Do not add signing steps here
  # without an accompanying spec update.
  # ---------------------------------------------------------------
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 20
          cache: npm
          # Two npm trees (root + client/) — key the cache on both lockfiles so
          # client-only dependency changes also refresh it.
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        shell: bash
        run: npm ci && cd client && npm ci

      - name: Download and verify Node.js ${{ env.NODE_BUNDLE_VERSION }} (Windows x64)
        shell: bash
        run: |
          set -euo pipefail
          NODE_VERSION="${NODE_BUNDLE_VERSION}"
          ZIPFILE="node-${NODE_VERSION}-win-x64.zip"
          URL="https://nodejs.org/dist/${NODE_VERSION}/${ZIPFILE}"
          echo "Downloading Node.js ${NODE_VERSION} (Windows x64)..."
          curl -fsSL "${URL}" -o "${ZIPFILE}"
          EXPECTED_SHA=$(curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/SHASUMS256.txt" \
            | grep "${ZIPFILE}" | awk '{print $1}')
          ACTUAL_SHA=$(sha256sum "${ZIPFILE}" | awk '{print $1}')
          if [[ "${EXPECTED_SHA}" != "${ACTUAL_SHA}" ]]; then
            echo "CHECKSUM MISMATCH: expected=${EXPECTED_SHA} actual=${ACTUAL_SHA}"
            exit 1
          fi
          echo "Checksum OK: ${ACTUAL_SHA}"
          mkdir -p src-tauri/runtimes/node
          unzip -q "${ZIPFILE}" -d tmp_node
          # The zip extracts to node-vX.Y.Z-win-x64/ — move contents up one level.
          mv "tmp_node/node-${NODE_VERSION}-win-x64/"* src-tauri/runtimes/node/
          rmdir "tmp_node/node-${NODE_VERSION}-win-x64" tmp_node
          rm "${ZIPFILE}"
          echo "Extracted Node.js ${NODE_VERSION} to src-tauri/runtimes/node/"

      - name: Download and verify Git for Windows portable (x64)
        shell: bash
        run: |
          set -euo pipefail
          GIT_VERSION="${{ env.GIT_BUNDLE_VERSION }}"
          # Git for Windows portable: self-extracting 7z archive from GitHub releases.
          ARCHIVE="PortableGit-${GIT_VERSION}-64-bit.7z.exe"
          # SHA256 from the v2.49.0.windows.1 release body (Filename | SHA-256 table).
          # Update this when bumping GIT_BUNDLE_VERSION.
          GIT_SHA256="bc980a64e875304ea5aa88386fda37e8a0089d0f2023616b9995b1ca75b471dd"
          URL="https://github.com/git-for-windows/git/releases/download/v${GIT_VERSION}.windows.1/${ARCHIVE}"
          echo "Downloading Git for Windows ${GIT_VERSION} portable (x64)..."
          curl -fsSL -L "${URL}" -o "${ARCHIVE}"
          ACTUAL_SHA=$(sha256sum "${ARCHIVE}" | awk '{print $1}')
          if [[ "${GIT_SHA256}" != "${ACTUAL_SHA}" ]]; then
            echo "CHECKSUM MISMATCH for ${ARCHIVE}: expected=${GIT_SHA256} actual=${ACTUAL_SHA}"
            exit 1
          fi
          echo "Checksum OK: ${ACTUAL_SHA}"
          echo "Extracting Git for Windows..."
          mkdir -p src-tauri/runtimes/git
          # The portable 7z.exe is a self-extracting archive; -o<dir> sets the output dir
          # (no space) and -y assumes yes for unattended extraction.
          chmod +x "${ARCHIVE}"
          ./"${ARCHIVE}" -o"src-tauri/runtimes/git" -y
          rm "${ARCHIVE}"
          test -f src-tauri/runtimes/git/cmd/git.exe
          echo "Extracted Git for Windows to src-tauri/runtimes/git/"

      - name: Assemble bundled Chromium (Windows x64)
        if: ${{ env.BUNDLE_CHROMIUM == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          # Ship Chromium as a single archive (uniform with macOS — the server extracts
          # it at first use). Windows has no framework symlinks, but archiving keeps one
          # runtime code path. Windows 10+ ships bsdtar as `tar`.
          npx playwright install chromium
          EXE=$(node -e "process.stdout.write(require('playwright').chromium.executablePath().replace(/\\\\/g,'/'))")
          PLATDIR=$(dirname "$EXE")   # → chrome-win
          test -n "$(find "$PLATDIR" -maxdepth 1 -name 'chrome.exe' | head -1)"
          rm -rf src-tauri/runtimes/chromium
          mkdir -p src-tauri/runtimes/chromium
          tar -czf /tmp/chromium.tar.gz -C "$(dirname "$PLATDIR")" "$(basename "$PLATDIR")"
          node scripts/obfuscate-chromium.mjs /tmp/chromium.tar.gz src-tauri/runtimes/chromium/chromium.pak
          rm -f /tmp/chromium.tar.gz
          test -f src-tauri/runtimes/chromium/chromium.pak
          echo "Packed Chromium from ${PLATDIR}"

      - name: Build desktop app
        shell: bash
        run: npm run build:desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Smoke test bundled runtimes (Windows x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # npm.cmd/npx.cmd resolve the adjacent node.exe via %~dp0 (self-contained,
          # PATH-independent), so we invoke every tool by absolute path. We still scrub
          # system Node/Git from PATH to prove the bundled tree stands alone.
          $cleanPath = ($env:PATH -split ';') | Where-Object {
            $_ -notmatch 'node' -and $_ -notmatch 'Git' -and $_ -notmatch 'nvm'
          } | Join-String -Separator ';'
          $env:PATH = $cleanPath

          $node = "src-tauri\runtimes\node\node.exe"
          $npm  = "src-tauri\runtimes\node\npm.cmd"
          $npx  = "src-tauri\runtimes\node\npx.cmd"
          $git  = "src-tauri\runtimes\git\cmd\git.exe"

          foreach ($tool in @($node, $npm, $npx, $git)) {
            Write-Host "Testing ${tool}..."
            & $tool --version
            if ($LASTEXITCODE -ne 0) { Write-Error "${tool} --version failed"; exit 1 }
          }

          # Functional git check: init + commit + log exercises git-core helpers/templates.
          $tmp = Join-Path $env:TEMP ("smokegit-" + [guid]::NewGuid())
          New-Item -ItemType Directory -Path $tmp | Out-Null
          # Hermetic git config without the "NUL" device: GIT_CONFIG_SYSTEM=NUL throws
          # "fatal: unable to access 'NUL': Invalid argument" on the Windows arm64
          # PortableGit build. Disable system config via NOSYSTEM and point the global
          # config at a path that doesn't exist (git treats a missing global config as empty).
          $env:GIT_CONFIG_NOSYSTEM = "1"; $env:GIT_CONFIG_GLOBAL = (Join-Path $tmp ".gitconfig-absent")
          & $git -C $tmp init -q;  if ($LASTEXITCODE -ne 0) { Write-Error "git init failed"; exit 1 }
          & $git -C $tmp -c user.email=ci@specrails.dev -c user.name=ci commit -q --allow-empty -m smoke; if ($LASTEXITCODE -ne 0) { Write-Error "git commit failed"; exit 1 }
          & $git -C $tmp log --oneline; if ($LASTEXITCODE -ne 0) { Write-Error "git log failed"; exit 1 }
          Remove-Item -Recurse -Force $tmp
          Write-Host "Smoke test PASSED."

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: windows-x64
          # Tauri emits NSIS under bundle/nsis/*.exe and MSI under bundle/msi/*.msi.
          # We upload both patterns; the deploy job renames them to the canonical
          # specrails-hub-<version>-x64-setup.exe / specrails-hub-<version>-x64.msi.
          path: |
            src-tauri/target/release/bundle/nsis/*.exe*
            src-tauri/target/release/bundle/msi/*.msi*
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Windows ARM64 build — runs on a native windows-11-arm runner so
  # the @yao-pkg/pkg sidecar + node-pty + better-sqlite3 prebuilds
  # all resolve to win32-arm64 without cross-compilation acrobatics.
  # Same v1-unsigned-on-purpose stance as the x64 build.
  # ---------------------------------------------------------------
  build-windows-arm64:
    runs-on: windows-11-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 20
          cache: npm
          # Two npm trees (root + client/) — key the cache on both lockfiles so
          # client-only dependency changes also refresh it.
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install Rust stable (aarch64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: arm64

      - name: Install dependencies
        shell: bash
        run: npm ci && cd client && npm ci

      - name: Download and verify Node.js ${{ env.NODE_BUNDLE_VERSION }} (Windows arm64)
        shell: bash
        run: |
          set -euo pipefail
          NODE_VERSION="${NODE_BUNDLE_VERSION}"
          ZIPFILE="node-${NODE_VERSION}-win-arm64.zip"
          URL="https://nodejs.org/dist/${NODE_VERSION}/${ZIPFILE}"
          echo "Downloading Node.js ${NODE_VERSION} (Windows arm64)..."
          curl -fsSL "${URL}" -o "${ZIPFILE}"
          EXPECTED_SHA=$(curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/SHASUMS256.txt" \
            | grep "${ZIPFILE}" | awk '{print $1}')
          ACTUAL_SHA=$(sha256sum "${ZIPFILE}" | awk '{print $1}')
          if [[ "${EXPECTED_SHA}" != "${ACTUAL_SHA}" ]]; then
            echo "CHECKSUM MISMATCH: expected=${EXPECTED_SHA} actual=${ACTUAL_SHA}"
            exit 1
          fi
          echo "Checksum OK: ${ACTUAL_SHA}"
          mkdir -p src-tauri/runtimes/node
          unzip -q "${ZIPFILE}" -d tmp_node
          mv "tmp_node/node-${NODE_VERSION}-win-arm64/"* src-tauri/runtimes/node/
          rmdir "tmp_node/node-${NODE_VERSION}-win-arm64" tmp_node
          rm "${ZIPFILE}"
          test -f src-tauri/runtimes/node/node.exe
          echo "Extracted Node.js ${NODE_VERSION} (arm64) to src-tauri/runtimes/node/"

      - name: Download and verify Git for Windows portable (arm64)
        shell: bash
        run: |
          set -euo pipefail
          GIT_VERSION="${{ env.GIT_BUNDLE_VERSION }}"
          ARCHIVE="PortableGit-${GIT_VERSION}-arm64.7z.exe"
          # SHA256 from the v2.49.0.windows.1 release body. Update on version bump.
          GIT_SHA256="8fa7e49b319b1109173a90a110aaeb0e9004600ff2ed44adc7dfe56ab21e4148"
          URL="https://github.com/git-for-windows/git/releases/download/v${GIT_VERSION}.windows.1/${ARCHIVE}"
          echo "Downloading Git for Windows ${GIT_VERSION} portable (arm64)..."
          curl -fsSL -L "${URL}" -o "${ARCHIVE}"
          ACTUAL_SHA=$(sha256sum "${ARCHIVE}" | awk '{print $1}')
          if [[ "${GIT_SHA256}" != "${ACTUAL_SHA}" ]]; then
            echo "CHECKSUM MISMATCH for ${ARCHIVE}: expected=${GIT_SHA256} actual=${ACTUAL_SHA}"
            exit 1
          fi
          echo "Checksum OK: ${ACTUAL_SHA}"
          mkdir -p src-tauri/runtimes/git
          chmod +x "${ARCHIVE}"
          ./"${ARCHIVE}" -o"src-tauri/runtimes/git" -y
          rm "${ARCHIVE}"
          test -f src-tauri/runtimes/git/cmd/git.exe
          echo "Extracted Git for Windows (arm64) to src-tauri/runtimes/git/"

      - name: Assemble bundled Chromium (Windows arm64)
        if: ${{ env.BUNDLE_CHROMIUM == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          # Ship Chromium as a single archive (uniform with macOS/x64 — the server
          # extracts it at first use). Windows 10+ ships bsdtar as `tar`.
          npx playwright install chromium
          EXE=$(node -e "process.stdout.write(require('playwright').chromium.executablePath().replace(/\\\\/g,'/'))")
          PLATDIR=$(dirname "$EXE")   # → chrome-win
          test -n "$(find "$PLATDIR" -maxdepth 1 -name 'chrome.exe' | head -1)"
          rm -rf src-tauri/runtimes/chromium
          mkdir -p src-tauri/runtimes/chromium
          tar -czf /tmp/chromium.tar.gz -C "$(dirname "$PLATDIR")" "$(basename "$PLATDIR")"
          node scripts/obfuscate-chromium.mjs /tmp/chromium.tar.gz src-tauri/runtimes/chromium/chromium.pak
          rm -f /tmp/chromium.tar.gz
          test -f src-tauri/runtimes/chromium/chromium.pak
          echo "Packed Chromium from ${PLATDIR}"

      - name: Build desktop app
        shell: bash
        run: npm run build:desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Smoke test bundled runtimes (Windows arm64)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $cleanPath = ($env:PATH -split ';') | Where-Object {
            $_ -notmatch 'node' -and $_ -notmatch 'Git' -and $_ -notmatch 'nvm'
          } | Join-String -Separator ';'
          $env:PATH = $cleanPath
          $node = "src-tauri\runtimes\node\node.exe"
          $npm  = "src-tauri\runtimes\node\npm.cmd"
          $npx  = "src-tauri\runtimes\node\npx.cmd"
          $git  = "src-tauri\runtimes\git\cmd\git.exe"
          foreach ($tool in @($node, $npm, $npx, $git)) {
            Write-Host "Testing ${tool}..."
            & $tool --version
            if ($LASTEXITCODE -ne 0) { Write-Error "${tool} --version failed"; exit 1 }
          }
          $tmp = Join-Path $env:TEMP ("smokegit-" + [guid]::NewGuid())
          New-Item -ItemType Directory -Path $tmp | Out-Null
          # Hermetic git config without the "NUL" device: GIT_CONFIG_SYSTEM=NUL throws
          # "fatal: unable to access 'NUL': Invalid argument" on the Windows arm64
          # PortableGit build. Disable system config via NOSYSTEM and point the global
          # config at a path that doesn't exist (git treats a missing global config as empty).
          $env:GIT_CONFIG_NOSYSTEM = "1"; $env:GIT_CONFIG_GLOBAL = (Join-Path $tmp ".gitconfig-absent")
          & $git -C $tmp init -q;  if ($LASTEXITCODE -ne 0) { Write-Error "git init failed"; exit 1 }
          & $git -C $tmp -c user.email=ci@specrails.dev -c user.name=ci commit -q --allow-empty -m smoke; if ($LASTEXITCODE -ne 0) { Write-Error "git commit failed"; exit 1 }
          & $git -C $tmp log --oneline; if ($LASTEXITCODE -ne 0) { Write-Error "git log failed"; exit 1 }
          Remove-Item -Recurse -Force $tmp
          Write-Host "Smoke test PASSED."

      - name: Upload Windows ARM64 installer artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: windows-arm64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe*
            src-tauri/target/release/bundle/msi/*.msi*
          if-no-files-found: error

  deploy:
    needs: [build-macos, build-windows, build-windows-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          # Keep per-job subdirs (dmg-aarch64/, windows-x64/, windows-arm64/)
          # so the rename step can disambiguate the two Windows architectures
          # — Tauri emits identically-named files (`SpecRails Hub_<v>_*.exe`)
          # for each target on its own runner.
          path: ./artifacts/

      # openspec: add-latest-release-channel
      # The deploy job publishes the .dmg twice:
      #   1. downloads/specrails-hub/v<tag>/  — archival, versioned (pre-existing behaviour)
      #   2. downloads/specrails-hub/latest/  — stable channel consumed by specrails-web
      #
      # Consumers (specrails-web) read manifest.json in latest/ to render the
      # Download CTA and surface the current version without hardcoding.
      #
      # IMPORTANT: The latest/ folder on Hostinger also contains a one-time,
      # hand-authored .htaccess file that must remain in place:
      #
      #     <Files "manifest.json">
      #       Header set Cache-Control "no-cache, must-revalidate"
      #       Header set Access-Control-Allow-Origin "*"
      #     </Files>
      #
      # The .htaccess is server-managed (Hostinger), NOT from this repo. Do
      # not add steps that wipe latest/ wholesale — only delete stale .dmg
      # files explicitly.

      - name: Compute release version
        id: vars
        run: |
          set -euo pipefail
          # github.ref_name is e.g. "v1.30.0" on tag pushes. Strip the leading "v".
          # For workflow_dispatch the user must dispatch against a v* tag so
          # the version is unambiguous; we fail fast otherwise.
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "This workflow must run against a v* tag. Got ref_name=${GITHUB_REF_NAME}"
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Rename installers to canonical filenames
        id: rename
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"

          out_dir="artifacts/canonical"
          mkdir -p "${out_dir}"

          rename_one() {
            local src="$1"
            local dest="$2"
            if [[ -z "${src}" || ! -f "${src}" ]]; then
              echo "Missing source: ${src}"
              exit 1
            fi
            cp "${src}" "${out_dir}/${dest}"
            echo "  ${src} -> ${out_dir}/${dest}"
          }

          # Tauri preserves the bundle/{dmg,nsis,msi}/ subdir structure inside
          # each artifact zip, so we use `find` to locate the binary regardless
          # of where exactly upload-artifact preserved the prefix.
          find_one() {
            find "$1" -type f -name "$2" 2>/dev/null | head -n1
          }

          # macOS .dmg from build-macos artifact dir (dmg-aarch64/).
          dmg_src="$(find_one artifacts/dmg-aarch64 '*.dmg')"
          dmg_canonical="specrails-hub-${VERSION}-aarch64.dmg"
          rename_one "${dmg_src}" "${dmg_canonical}"

          # Windows x64 from windows-x64/ artifact dir (nested in nsis/ + msi/).
          exe_x64_src="$(find_one artifacts/windows-x64 '*.exe')"
          exe_x64_canonical="specrails-hub-${VERSION}-x64-setup.exe"
          rename_one "${exe_x64_src}" "${exe_x64_canonical}"

          msi_x64_src="$(find_one artifacts/windows-x64 '*.msi')"
          msi_x64_canonical="specrails-hub-${VERSION}-x64.msi"
          rename_one "${msi_x64_src}" "${msi_x64_canonical}"

          # Windows ARM64 from windows-arm64/ artifact dir (nested in nsis/ + msi/).
          exe_arm64_src="$(find_one artifacts/windows-arm64 '*.exe')"
          exe_arm64_canonical="specrails-hub-${VERSION}-arm64-setup.exe"
          rename_one "${exe_arm64_src}" "${exe_arm64_canonical}"

          msi_arm64_src="$(find_one artifacts/windows-arm64 '*.msi')"
          msi_arm64_canonical="specrails-hub-${VERSION}-arm64.msi"
          rename_one "${msi_arm64_src}" "${msi_arm64_canonical}"

          echo "dmg_filename=${dmg_canonical}" >> "$GITHUB_OUTPUT"
          echo "dmg_path=${out_dir}/${dmg_canonical}" >> "$GITHUB_OUTPUT"
          echo "exe_x64_filename=${exe_x64_canonical}" >> "$GITHUB_OUTPUT"
          echo "exe_x64_path=${out_dir}/${exe_x64_canonical}" >> "$GITHUB_OUTPUT"
          echo "msi_x64_filename=${msi_x64_canonical}" >> "$GITHUB_OUTPUT"
          echo "msi_x64_path=${out_dir}/${msi_x64_canonical}" >> "$GITHUB_OUTPUT"
          echo "exe_arm64_filename=${exe_arm64_canonical}" >> "$GITHUB_OUTPUT"
          echo "exe_arm64_path=${out_dir}/${exe_arm64_canonical}" >> "$GITHUB_OUTPUT"
          echo "msi_arm64_filename=${msi_arm64_canonical}" >> "$GITHUB_OUTPUT"
          echo "msi_arm64_path=${out_dir}/${msi_arm64_canonical}" >> "$GITHUB_OUTPUT"
          ls -la "${out_dir}/"

      - name: Compute sha256 and byte size for each manifest-referenced binary
        id: hash
        run: |
          set -euo pipefail

          hash_one() {
            local path="$1"
            local sha
            local size
            sha="$(sha256sum "${path}" | awk '{print $1}')"
            size="$(stat -c%s "${path}")"
            echo "${sha}|${size}"
          }

          IFS='|' read -r dmg_sha dmg_size < <(hash_one "${{ steps.rename.outputs.dmg_path }}")
          echo "dmg_sha256=${dmg_sha}" >> "$GITHUB_OUTPUT"
          echo "dmg_size=${dmg_size}" >> "$GITHUB_OUTPUT"
          echo "dmg: sha256=${dmg_sha} size=${dmg_size}"

          IFS='|' read -r exe_x64_sha exe_x64_size < <(hash_one "${{ steps.rename.outputs.exe_x64_path }}")
          echo "exe_x64_sha256=${exe_x64_sha}" >> "$GITHUB_OUTPUT"
          echo "exe_x64_size=${exe_x64_size}" >> "$GITHUB_OUTPUT"
          echo "exe x64: sha256=${exe_x64_sha} size=${exe_x64_size}"

          IFS='|' read -r exe_arm64_sha exe_arm64_size < <(hash_one "${{ steps.rename.outputs.exe_arm64_path }}")
          echo "exe_arm64_sha256=${exe_arm64_sha}" >> "$GITHUB_OUTPUT"
          echo "exe_arm64_size=${exe_arm64_size}" >> "$GITHUB_OUTPUT"
          echo "exe arm64: sha256=${exe_arm64_sha} size=${exe_arm64_size}"

          # MSI is not referenced by manifest.json, so no sha/size required here.

      - name: Build manifest.json
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          TAG="${{ steps.vars.outputs.tag }}"

          DMG_FILENAME="${{ steps.rename.outputs.dmg_filename }}"
          DMG_SHA="${{ steps.hash.outputs.dmg_sha256 }}"
          DMG_SIZE="${{ steps.hash.outputs.dmg_size }}"
          DMG_URL="https://specrails.dev/downloads/specrails-hub/latest/${DMG_FILENAME}"

          EXE_X64_FILENAME="${{ steps.rename.outputs.exe_x64_filename }}"
          EXE_X64_SHA="${{ steps.hash.outputs.exe_x64_sha256 }}"
          EXE_X64_SIZE="${{ steps.hash.outputs.exe_x64_size }}"
          EXE_X64_URL="https://specrails.dev/downloads/specrails-hub/latest/${EXE_X64_FILENAME}"

          EXE_ARM64_FILENAME="${{ steps.rename.outputs.exe_arm64_filename }}"
          EXE_ARM64_SHA="${{ steps.hash.outputs.exe_arm64_sha256 }}"
          EXE_ARM64_SIZE="${{ steps.hash.outputs.exe_arm64_size }}"
          EXE_ARM64_URL="https://specrails.dev/downloads/specrails-hub/latest/${EXE_ARM64_FILENAME}"

          RELEASED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          RELEASE_URL="https://github.com/fjpulidop/specrails-hub/releases/tag/${TAG}"

          mkdir -p manifest
          cat > manifest/manifest.json <<JSON
          {
            "schemaVersion": 1,
            "version": "${VERSION}",
            "releasedAt": "${RELEASED_AT}",
            "releaseUrl": "${RELEASE_URL}",
            "platforms": {
              "darwin-arm64": {
                "filename": "${DMG_FILENAME}",
                "url": "${DMG_URL}",
                "sha256": "${DMG_SHA}",
                "size": ${DMG_SIZE}
              },
              "windows-x64": {
                "filename": "${EXE_X64_FILENAME}",
                "url": "${EXE_X64_URL}",
                "sha256": "${EXE_X64_SHA}",
                "size": ${EXE_X64_SIZE}
              },
              "windows-arm64": {
                "filename": "${EXE_ARM64_FILENAME}",
                "url": "${EXE_ARM64_URL}",
                "sha256": "${EXE_ARM64_SHA}",
                "size": ${EXE_ARM64_SIZE}
              }
            }
          }
          JSON

          # Fail fast if the JSON is malformed.
          jq empty manifest/manifest.json
          cat manifest/manifest.json

      - name: Build Tauri updater latest.json
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          TAG="${{ steps.vars.outputs.tag }}"
          RELEASED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          RELEASE_URL_BASE="https://github.com/fjpulidop/specrails-hub/releases/download/${TAG}"

          mkdir -p updater
          platforms='{}'

          add_platform() {
            local platform="$1"
            local dir="$2"
            local pattern="$3"
            local canonical="$4"
            local sig
            local pkg
            sig="$(find "${dir}" -type f -name "${pattern}.sig" 2>/dev/null | head -n1)"
            if [[ -z "${sig}" ]]; then
              echo "Missing updater signature for ${platform}: ${dir}/${pattern}.sig"
              exit 1
            fi
            pkg="${sig%.sig}"
            if [[ ! -f "${pkg}" ]]; then
              echo "Missing updater package paired with ${sig}"
              exit 1
            fi

            cp "${pkg}" "updater/${canonical}"
            cp "${sig}" "updater/${canonical}.sig"

            local signature
            signature="$(tr -d '\r\n' < "${sig}")"
            local url="${RELEASE_URL_BASE}/${canonical}"
            platforms="$(jq -c \
              --arg platform "${platform}" \
              --arg signature "${signature}" \
              --arg url "${url}" \
              '. + {($platform): {signature: $signature, url: $url}}' \
              <<< "${platforms}")"

            echo "Updater ${platform}: ${canonical}"
          }

          add_platform "darwin-aarch64" "artifacts/dmg-aarch64" "*.app.tar.gz" \
            "specrails-hub-${VERSION}-darwin-aarch64.app.tar.gz"
          add_platform "windows-x86_64" "artifacts/windows-x64" "*.msi" \
            "specrails-hub-${VERSION}-windows-x86_64.msi"
          add_platform "windows-aarch64" "artifacts/windows-arm64" "*.msi" \
            "specrails-hub-${VERSION}-windows-aarch64.msi"

          jq -n \
            --arg version "${VERSION}" \
            --arg pub_date "${RELEASED_AT}" \
            --arg body "SpecRails Hub ${VERSION}" \
            --argjson platforms "${platforms}" \
            '{version: $version, notes: $body, pub_date: $pub_date, platforms: $platforms}' \
            > updater/latest.json

          jq empty updater/latest.json
          cat updater/latest.json
          ls -la updater/

      - name: Publish Tauri updater assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --title "SpecRails Hub ${TAG}" --notes "SpecRails Hub ${TAG}"
          fi
          # GitHub Releases is the durable archive. Hostinger only retains the
          # current and previous versioned folders to stay within its quota.
          gh release upload "${TAG}" updater/* artifacts/canonical/* --clobber

      # Upload only the canonical-named installers (artifacts/canonical/). The
      # per-job subdirectories with raw Tauri filenames stay out so the
      # versioned folder mirrors what consumers expect.
      - name: Deploy versioned installers to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          protocol: ftp
          local-dir: ./artifacts/canonical/
          server-dir: domains/specrails.dev/public_html/downloads/specrails-hub/${{ steps.vars.outputs.tag }}/

      # ---------------------------------------------------------------
      # latest/ channel — openspec: add-latest-release-channel + add-windows-desktop-release
      # ---------------------------------------------------------------
      #
      # Ordering matters (spec: desktop-release-channel):
      #   1. Delete any prior installer files in latest/ (keep .htaccess untouched).
      #   2. Upload the new .dmg, .exe, and .msi.
      #   3. HEAD-verify every binary referenced by manifest.json is HTTP-reachable.
      #   4. Upload manifest.json.
      #   5. HEAD-verify manifest.json is HTTP-reachable and valid JSON.
      #
      # A consumer that sees the new manifest must always find the
      # referenced binary. Never upload manifest.json before step 3 passes
      # for EVERY platform listed in the manifest.

      - name: Delete stale installers in latest/
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          set -euo pipefail
          remote="domains/specrails.dev/public_html/downloads/specrails-hub/latest/"
          # List the directory. Returns just filenames when using --list-only.
          # Match .dmg (mac), .exe (Windows NSIS), .msi (Windows MSI). Do NOT
          # delete manifest.json (it gets overwritten) or .htaccess (server-managed).
          stale="$(curl -s --ftp-pasv --user "${FTP_USER}:${FTP_PASS}" "ftp://${HOST}/${remote}" --list-only | grep -E '\.(dmg|exe|msi)$' || true)"
          if [[ -z "${stale}" ]]; then
            echo "No stale installer files in latest/"
            exit 0
          fi
          while IFS= read -r f; do
            [[ -z "${f}" ]] && continue
            echo "Deleting stale: ${f}"
            curl -s --ftp-pasv --user "${FTP_USER}:${FTP_PASS}" \
              -Q "DELE ${remote}${f}" \
              "ftp://${HOST}/${remote}" || echo "  (DELE failed for ${f}; continuing)"
          done <<< "${stale}"

      - name: Upload new installers to latest/
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          set -euo pipefail
          remote="domains/specrails.dev/public_html/downloads/specrails-hub/latest/"
          # --ftp-create-dirs auto-creates the latest/ folder on first run.
          for file in \
            "${{ steps.rename.outputs.dmg_path }}" \
            "${{ steps.rename.outputs.exe_x64_path }}" \
            "${{ steps.rename.outputs.msi_x64_path }}" \
            "${{ steps.rename.outputs.exe_arm64_path }}" \
            "${{ steps.rename.outputs.msi_arm64_path }}"; do
            curl --fail --silent --show-error --ftp-pasv --ftp-create-dirs \
              --user "${FTP_USER}:${FTP_PASS}" \
              -T "${file}" \
              "ftp://${HOST}/${remote}"
            echo "Uploaded $(basename "${file}") to ${remote}"
          done

      - name: Verify manifest-referenced binaries are HTTP-reachable
        run: |
          set -euo pipefail
          # HEAD every URL that manifest.json will reference. The MSI is NOT in
          # manifest.json (consumers reach it via the versioned folder) so we
          # don't gate the manifest upload on it here.
          for filename in \
            "${{ steps.rename.outputs.dmg_filename }}" \
            "${{ steps.rename.outputs.exe_x64_filename }}" \
            "${{ steps.rename.outputs.exe_arm64_filename }}"; do
            url="https://specrails.dev/downloads/specrails-hub/latest/${filename}"
            ok=""
            # Retry briefly to absorb FTP-to-HTTP propagation.
            for i in 1 2 3 4 5 6; do
              code="$(curl --head --silent --output /dev/null --write-out '%{http_code}' "${url}")"
              if [[ "${code}" == "200" ]]; then
                echo "✓ ${url} reachable"
                ok="1"
                break
              fi
              echo "  attempt ${i}: ${url} -> HTTP ${code}, retrying in 5s..."
              sleep 5
            done
            if [[ -z "${ok}" ]]; then
              echo "✗ ${url} still not reachable"
              exit 1
            fi
          done

      - name: Upload manifest.json to latest/
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          set -euo pipefail
          remote="domains/specrails.dev/public_html/downloads/specrails-hub/latest/"
          # --ftp-create-dirs is defensive; latest/ should already exist from
          # the previous step but we keep the flag for idempotency.
          curl --fail --silent --show-error --ftp-pasv --ftp-create-dirs \
            --user "${FTP_USER}:${FTP_PASS}" \
            -T manifest/manifest.json \
            "ftp://${HOST}/${remote}"
          echo "Uploaded manifest.json to ${remote}"

      - name: Verify manifest.json is reachable and valid JSON
        run: |
          set -euo pipefail
          url="https://specrails.dev/downloads/specrails-hub/latest/manifest.json"
          for i in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error "${url}" -o /tmp/manifest.json; then
              if jq empty /tmp/manifest.json; then
                echo "✓ manifest.json reachable and valid"
                cat /tmp/manifest.json
                exit 0
              fi
            fi
            echo "  attempt ${i}: manifest.json not yet valid, retrying in 5s..."
            sleep 5
          done
          echo "✗ manifest.json not reachable or invalid"
          exit 1
