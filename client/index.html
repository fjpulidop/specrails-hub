<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy (B7). 'unsafe-inline'/'unsafe-eval' are required by
      the inline anti-FOUC script, Tailwind's injected styles, the Vite dev runtime,
      and Monaco — so script/style stay permissive. The value comes from locking
      down what we CAN without breaking the app: connect only to self + the local
      sidecar (http/ws on localhost/127.0.0.1) and https/wss; no <object>, no
      <base> hijack, and no framing (anti-clickjacking).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* https: wss:; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <title>Specrails</title>
    <!--
      Anti-FOUC: read the cached theme synchronously and apply it to <html>
      BEFORE Vite's module bundle loads. Without this, every boot would flash
      the default Dracula palette for one frame before the chosen theme
      paints. Allow-list matches THEME_IDS in client/src/lib/themes.ts.
    -->
    <script>
      (function () {
        // One-time migration: legacy `specrails-hub:*` localStorage keys are
        // renamed to `specrails-desktop:*` (Specrails Hub → Specrails rebrand).
        // Must run BEFORE the anti-FOUC theme/language reads below so the very
        // first paint after an upgrade still honours the user's saved settings.
        try {
          var legacyPrefix = 'specrails-hub:'
          var newPrefix = 'specrails-desktop:'
          var legacyKeys = []
          for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i)
            if (key && key.indexOf(legacyPrefix) === 0) legacyKeys.push(key)
          }
          for (var j = 0; j < legacyKeys.length; j++) {
            var oldKey = legacyKeys[j]
            var renamed = newPrefix + oldKey.slice(legacyPrefix.length)
            if (localStorage.getItem(renamed) === null) {
              localStorage.setItem(renamed, localStorage.getItem(oldKey))
            }
            localStorage.removeItem(oldKey)
          }
        } catch (_) { /* storage unavailable — nothing to migrate */ }
        try {
          var k = 'specrails-desktop:ui-theme'
          var allowed = ['dracula', 'aurora-light', 'obsidian-dark', 'matrix', 'specrails']
          var v = localStorage.getItem(k)
          document.documentElement.dataset.theme =
            v && allowed.indexOf(v) !== -1 ? v : 'specrails'
        } catch (_) {
          document.documentElement.dataset.theme = 'specrails'
        }
      })()
    </script>
    <!--
      Inline splash: renders instantly while the JS bundle parses + initAuth()
      polls the sidecar. Faded out as soon as React mounts (see main.tsx).
    -->
    <style>
      /* Theme-aware splash. Three CSS variables set at <html> level by the
         anti-FOUC boot script via [data-theme="..."]; the splash reads them
         so the loading screen always matches the user's chosen theme. */
      html[data-theme="dracula"] {
        --splash-bg: #282a36;
        --splash-fg: #f8f8f2;
        --splash-primary: #bd93f9;
        --splash-secondary: #ff79c6;
        --splash-muted: #6272a4;
      }
      html[data-theme="aurora-light"] {
        --splash-bg: #fafbfd;
        --splash-fg: #1a1d2b;
        --splash-primary: #5733e0;
        --splash-secondary: #d62a85;
        --splash-muted: #5b6178;
      }
      html[data-theme="obsidian-dark"] {
        --splash-bg: #10121a;
        --splash-fg: #e3e6f0;
        --splash-primary: #b78cf5;
        --splash-secondary: #f48fc7;
        --splash-muted: #8b8fa3;
      }
      html[data-theme="matrix"] {
        --splash-bg: #08120e;
        --splash-fg: #b8ffd9;
        --splash-primary: #00ff66;
        --splash-secondary: #4fd1c5;
        --splash-muted: #4a8f6e;
      }
      html[data-theme="specrails"] {
        --splash-bg: #08070f;
        --splash-fg: #ededf5;
        --splash-primary: #00c3d2;
        --splash-secondary: #9a6fce;
        --splash-muted: #6b6f8c;
      }
      html, body {
        margin: 0;
        background: var(--splash-bg);
        color: var(--splash-fg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      }
      #specrails-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        background:
          radial-gradient(1200px 600px at 50% 40%, color-mix(in srgb, var(--splash-primary) 10%, transparent), transparent 60%),
          radial-gradient(900px 500px at 80% 80%, color-mix(in srgb, var(--splash-secondary) 8%, transparent), transparent 60%),
          var(--splash-bg);
        z-index: 9999;
        opacity: 1;
        transition: opacity 220ms ease-out, visibility 0s linear 220ms;
        -webkit-font-smoothing: antialiased;
        -webkit-app-region: drag;
      }
      #specrails-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }
      .specrails-splash__mark {
        width: 136px;
        height: 136px;
        display: block;
        overflow: visible;
      }
      .specrails-splash__mark .pill {
        transform-box: fill-box;
        transform-origin: center;
        animation: splash-pill-travel 2.4s ease-in-out infinite;
      }
      .specrails-splash__mark .pill-body {
        filter:
          drop-shadow(0 0 14px var(--splash-primary))
          drop-shadow(0 0 26px color-mix(in srgb, var(--splash-secondary) 55%, transparent));
      }
      .specrails-splash__mark .bar-1 {
        animation: splash-bar 2.4s ease-in-out infinite;
      }
      .specrails-splash__mark .bar-2 {
        animation: splash-bar 2.4s ease-in-out infinite;
        animation-delay: 0.4s;
      }
      .specrails-splash__glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse 60% 45% at 50% 50%,
          color-mix(in srgb, var(--splash-primary) 22%, transparent) 0%,
          color-mix(in srgb, var(--splash-primary) 6%, transparent) 30%,
          transparent 58%
        );
        animation: splash-glow 2.4s ease-in-out infinite;
      }
      /* The pill rides the rails: fades in from the left, rests in the
         centre for ~0.5s, then shoots off to the right and fades out. */
      @keyframes splash-pill-travel {
        0%   { transform: translateX(-1000px); opacity: 0; }
        28%  { transform: translateX(0);       opacity: 1; }
        48%  { transform: translateX(0);       opacity: 1;
               animation-timing-function: cubic-bezier(0.6, 0, 0.85, 0.15); }
        60%  { transform: translateX(1100px);  opacity: 0; }
        100% { transform: translateX(1100px);  opacity: 0; }
      }
      @keyframes splash-bar {
        0%, 100% { opacity: 0.28; }
        50% { opacity: 0.6; }
      }
      @keyframes splash-glow {
        0%, 100% { opacity: 0.1; }
        28%, 48% { opacity: 0.45; }
        60% { opacity: 0.1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .specrails-splash__mark .pill,
        .specrails-splash__mark .bar-1,
        .specrails-splash__mark .bar-2,
        .specrails-splash__glow {
          animation: none;
        }
        .specrails-splash__mark .pill { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="specrails-splash" aria-hidden="false" role="status" aria-label="Loading Specrails">
      <div class="specrails-splash__glow" aria-hidden="true"></div>
      <svg
        class="specrails-splash__mark"
        viewBox="64 166 384 182"
        role="img"
        aria-label="Specrails"
      >
        <defs>
          <linearGradient id="splash-pillfill" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="var(--splash-primary)"></stop>
            <stop offset="100%" stop-color="var(--splash-secondary)"></stop>
          </linearGradient>
        </defs>
        <rect class="bar-1" x="80" y="182" width="352" height="18" rx="9" fill="var(--splash-muted)"></rect>
        <rect class="bar-2" x="80" y="314" width="352" height="18" rx="9" fill="var(--splash-muted)"></rect>
        <g class="pill">
          <rect class="pill-body" x="80" y="220" width="352" height="72" rx="36" fill="url(#splash-pillfill)"></rect>
        </g>
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
