name: Desktop Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # allows manual trigger from GitHub UI or: gh workflow run desktop-release.yml

jobs:
  build-macos:
    runs-on: macos-latest  # Apple Silicon (arm64)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci && cd client && npm ci

      - name: Import codesign certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install Apple API key for notarization
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Build desktop app
        run: npm run build:desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dmg-aarch64
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  deploy:
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download all .dmg artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/
          merge-multiple: true

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          protocol: ftp
          local-dir: ./artifacts/
          server-dir: domains/specrails.dev/public_html/downloads/specrails-hub/${{ github.ref_name }}/
